# File: 042-database-postgresql-config.yaml
#
# Description:
# PostgreSQL Helm chart configuration using the official Bitnami PostgreSQL image.
# As of 2026-03, Bitnami ships all 8 required extensions pre-built — pgvector,
# PostGIS, hstore, ltree, uuid-ossp, pg_trgm, btree_gin, pgcrypto — so a custom
# container image is no longer needed.
#
# History:
# Previously used a custom container (ghcr.io/helpers-no/urbalurba-postgresql)
# built from containers/postgresql/Dockerfile. Bitnami removed version-pinned
# tags (e.g. bitnami/postgresql:16) and their latest image (PostgreSQL 18)
# includes all extensions we previously built manually. The custom container,
# its Dockerfile, build script, and GitHub Actions workflow were removed.
#
# Pinned version: PostgreSQL 18.3 (Bitnami image digest below)
# Image: bitnami/postgresql@sha256:be1c3052a04d228fcdef62a34a4847ac7990746a82ec678cdffa56dbd5e47aa2
#
# Available Extensions (8 total, all pre-built in Bitnami image):
#   pgvector 0.8.2  — Vector similarity search and AI embeddings
#   PostGIS 3.6.2   — Geospatial data types and operations
#   hstore 1.8      — Key-value pairs in database columns
#   ltree 1.3       — Hierarchical tree-like data structures
#   uuid-ossp       — UUID generation functions (built-in)
#   pg_trgm 1.6     — Trigram matching for fuzzy text search
#   btree_gin 1.3   — Additional indexing methods
#   pgcrypto 1.4    — Cryptographic functions
#
# Suitable for:
# - AI applications requiring vector search (RAG, embeddings)
# - Geospatial applications (mapping, location services)
# - Modern web applications with complex data types
# - Applications requiring hierarchical data or advanced indexing
#
# Requirements:
# - Helm repo: bitnami/postgresql should be added to your helm repos
# - A PersistentVolumeClaim (PVC) must exist or be dynamically provisioned for storage
# - (Recommended) Set the database password using a Kubernetes secret or Helm values
#
# Usage:
# installing: helm install postgresql bitnami/postgresql -f 042-database-postgresql-config.yaml -n default
# upgrading:  helm upgrade postgresql bitnami/postgresql -f 042-database-postgresql-config.yaml -n default
# uninstalling: helm uninstall postgresql -n default
#
# Debugging commands:
# check pod status: kubectl get pods -n default | grep postgresql
# view logs: kubectl logs -f statefulset/postgresql -n default
# port-forward for direct DB access: kubectl port-forward svc/postgresql 5432:5432 -n default
# test connection: psql postgresql://<user>:<password>@localhost:5432/<database>
# verify extensions: kubectl exec -it postgresql-0 -- psql -U postgres -c "SELECT extname, extversion FROM pg_extension ORDER BY extname;"
#
# All extensions are enabled in the default database at initialization.
# If you create a new database, manually enable extensions using:
# CREATE EXTENSION IF NOT EXISTS <extension_name>;

global:
  postgresql:
    service:
      ports:
        postgresql: 5432

# Use the official Bitnami PostgreSQL image (includes all required extensions)
# Pinned by digest to prevent unexpected upgrades
image:
  registry: docker.io
  repository: bitnami/postgresql
  digest: "sha256:be1c3052a04d228fcdef62a34a4847ac7990746a82ec678cdffa56dbd5e47aa2"
  pullPolicy: IfNotPresent

primary:
  # Disable resourcesPreset so our explicit resources take effect
  resourcesPreset: ""

  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m

  persistence:
    enabled: true
    size: 8Gi  # Adjust size as needed

  # PostgreSQL uses scram-sha-256 password encryption.
  # The Bitnami chart generates pg_hba.conf with md5 auth method by default.
  # This mismatch causes "password authentication failed" on fresh installs.
  # Fix: use scram-sha-256 in pg_hba.conf to match the password storage format.
  pgHbaConfiguration: |-
    local all all scram-sha-256
    host all all 0.0.0.0/0 scram-sha-256
    host all all ::/0 scram-sha-256

  # Enable all available extensions at startup
  # All 8 extensions are pre-built into the Bitnami image
  initdb:
    scripts:
      enable-extensions.sql: |
        -- AI and Vector Search Extensions
        CREATE EXTENSION IF NOT EXISTS vector;

        -- Geospatial Extensions
        CREATE EXTENSION IF NOT EXISTS postgis;

        -- Advanced Data Type Extensions
        CREATE EXTENSION IF NOT EXISTS hstore;
        CREATE EXTENSION IF NOT EXISTS ltree;

        -- Utility Extensions
        CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
        CREATE EXTENSION IF NOT EXISTS pg_trgm;
        CREATE EXTENSION IF NOT EXISTS btree_gin;
        CREATE EXTENSION IF NOT EXISTS pgcrypto;

service:
  type: ClusterIP

auth:
  postgresPassword: ""  # This will be set by the Helm command

# Bitnami PostgreSQL image provides all extensions
# No additional configuration needed - extensions are pre-built and ready to use
