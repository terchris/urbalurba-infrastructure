# 653-backstage-catalog.yaml
#
# Description:
# ConfigMap placeholder for the Backstage catalog files.
# The actual ConfigMap is created by the setup playbook from
# the generated catalog files in generated/backstage/catalog/.
#
# The setup playbook (650-setup-backstage.yml) generates the catalog
# using 'uis catalog generate' and creates this ConfigMap from
# all YAML files in the output directory.
#
# This file is NOT applied directly — it documents the expected
# ConfigMap structure. The playbook creates it dynamically:
#
#   kubectl create configmap backstage-catalog \
#     --from-file=generated/backstage/catalog/ \
#     -n backstage --dry-run=client -o yaml | kubectl apply -f -
#
# Manual recreation (if needed):
#   cd /mnt/urbalurbadisk
#   ./uis catalog generate
#   kubectl create configmap backstage-catalog \
#     --from-file=generated/backstage/catalog/ \
#     -n backstage --dry-run=client -o yaml | kubectl apply -f -

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-catalog
  namespace: backstage
  labels:
    app: backstage
    component: catalog
data:
  # Populated dynamically by the setup playbook from generated/backstage/catalog/
  # Contains all.yaml and individual entity files
  all.yaml: |
    # This is a placeholder. The actual content is generated by:
    # ./uis catalog generate
