# file: /mnt/urbalurbadisk/manifests/091-gravitee-ingress.yaml
# description: Hostname + path routing for Gravitee APIM 4.11
#
# HOSTNAME STRATEGY (HostRegexp-based — works on localhost, Tailscale, Cloudflare):
#
#   gravitee.<domain>              Console SPA (gravitee-apim-ui:8002)
#   gravitee.<domain>/management/  Management API (gravitee-apim-api:83)
#   gravitee.<domain>/portal/      Portal-facing API (same api pod, different sub-path)
#   gravitee.<domain>/_portal/     Developer Portal SPA (gravitee-apim-portal:8003)
#   gravitee-gw.<domain>           Public API Gateway (gravitee-apim-gateway:82)
#
# WHY CONSOLE + API SHARE A HOSTNAME:
# Gravitee's auth uses an HttpOnly session cookie set by the management API on
# login. Cross-origin XHR (Console at gravitee.<domain> calling API at a
# different subdomain) needs SameSite=None;Secure, which requires HTTPS. On
# plain HTTP for laptop dev, the only workable shape is same-origin: route the
# management API under /management/ on the Console hostname so cookies travel
# trivially. This matches the chart's default deployment shape (Console at
# /console/, API at /management/ on the same host).
#
# Match priorities are explicit: PathPrefix routes have priority 100 so they
# match before the catch-all root route on the same host.
#
# Service names and ports verified against `helm template graviteeio/apim
# --version 4.11.3`. No chart-managed Kubernetes Ingress is created — UIS owns
# routing here. All routes are public (no Authentik forward auth) for v1;
# SSO is a follow-up plan.

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gravitee-console
  namespace: gravitee
  labels:
    app: gravitee-apim
    component: ui
spec:
  entryPoints:
    - web
  routes:
    # Management + portal API endpoints share the Console hostname. Higher
    # priority than the catch-all UI route below so PathPrefix matches first.
    - match: HostRegexp(`gravitee\..+`) && (PathPrefix(`/management`) || PathPrefix(`/portal`))
      kind: Rule
      priority: 100
      services:
        - name: gravitee-apim-api
          port: 83
    # Developer Portal SPA at /_portal/* on the same hostname (was a separate
    # gravitee-portal.<domain> hostname in v1). Same-origin with the Console,
    # so the Portal SPA's REST calls (relative baseURL: /portal) and any auth
    # cookies travel without SameSite/HTTPS gymnastics.
    #
    # Two pieces work together to make sub-path serving correct:
    #   1. PORTAL_BASE_HREF=/_portal/ in 090-gravitee-config.yaml — tells the
    #      Portal SPA's served HTML to set <base href="/_portal/">, so the
    #      browser constructs asset URLs WITH the prefix.
    #   2. The strip-portal-prefix middleware below — tells Traefik to REMOVE
    #      the /_portal prefix before forwarding to the portal pod. The pod's
    #      nginx serves files from /usr/share/nginx/html/ (no /_portal/
    #      sub-directory), so it needs the bare path.
    # Without (2), all assets would 404 inside the pod and the SPA's nginx
    # fallback returns index.html for every miss → blank-page-of-death.
    - match: HostRegexp(`gravitee\..+`) && PathPrefix(`/_portal`)
      kind: Rule
      priority: 100
      middlewares:
        - name: gravitee-portal-strip
      services:
        - name: gravitee-apim-portal
          port: 8003
    # Everything else on the Console hostname → SPA shell + assets.
    - match: HostRegexp(`gravitee\..+`)
      kind: Rule
      services:
        - name: gravitee-apim-ui
          port: 8002

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gravitee-gateway
  namespace: gravitee
  labels:
    app: gravitee-apim
    component: gateway
spec:
  entryPoints:
    - web
  routes:
    - match: HostRegexp(`gravitee-gw\..+`)
      kind: Rule
      services:
        - name: gravitee-apim-gateway
          port: 82

---
# Strip /_portal prefix before forwarding to the Portal SPA pod. Browser sees
# /_portal/<asset> paths (because <base href="/_portal/"> is injected by
# PORTAL_BASE_HREF); the pod's nginx serves files from /usr/share/nginx/html/
# without the prefix. This middleware bridges the two. Referenced by the
# /_portal route on the gravitee-console IngressRoute above.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gravitee-portal-strip
  namespace: gravitee
  labels:
    app: gravitee-apim
    component: portal
spec:
  stripPrefix:
    prefixes:
      - /_portal

