# File: 003-traefik-config.yaml  
# Description: Helm values configuration for Traefik ingress controller
#
# Purpose:
# - Configures Traefik similar to Rancher Desktop setup for consistency
# - Uses LoadBalancer service type for Azure AKS external access
# - Enables Kubernetes Ingress provider and published service
# - Sets up dual-stack IP family policy
#
# Usage:
# helm install traefik traefik/traefik -f manifests/003-traefik-config.yaml --namespace kube-system
#
# Based on Rancher Desktop Traefik configuration with AKS-specific adjustments

# Deployment configuration
deployment:
  podAnnotations:
    prometheus.io/port: "8082"
    prometheus.io/scrape: "true"

# Global settings
global:
  systemDefaultRegistry: ""

# Image configuration (using official Traefik image)
# Pinned to match rancher-desktop's k3s-bundled Traefik (rancher/mirrored-library-traefik:3.6.13).
# Bumped together with the helm chart pin (39.0.7) — see ansible/playbooks/003-setup-traefik.yml.
image:
  repository: traefik
  tag: v3.6.13

# High priority for system components
priorityClassName: system-cluster-critical

# Provider configuration
providers:
  kubernetesIngress:
    publishedService:
      enabled: true

# Service configuration
service:
  type: LoadBalancer
  ipFamilyPolicy: PreferDualStack

# Port configuration - use non-privileged ports internally.
# Chart 39 enables TLS on websecure by default (the old `ports.websecure.tls`
# nested key was removed from the schema in chart 28). Don't add it back.
ports:
  web:
    port: 8000
    protocol: TCP
  websecure:
    port: 8443
    protocol: TCP

# Resource limits for AKS
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# Tolerations for scheduling flexibility (adapted for AKS)
tolerations:
- key: CriticalAddonsOnly
  operator: Exists
- effect: NoSchedule
  key: node-role.kubernetes.io/control-plane
  operator: Exists
- effect: NoSchedule
  key: node-role.kubernetes.io/master
  operator: Exists

# Traefik proxy CLI flags. Chart 39 dropped the top-level `globalArguments`
# key from the schema in favor of `additionalArguments`, which passes
# through to the binary unchanged. The --global.* flags are still valid
# Traefik proxy flags; only the chart-side wrapper key changed.
additionalArguments:
- "--global.checknewversion=false"
- "--global.sendanonymoususage=false"
- "--log.level=INFO"

# Enable dashboard for debugging (optional)
ingressRoute:
  dashboard:
    enabled: false  # Set to true if you want the dashboard exposed