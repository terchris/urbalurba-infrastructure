# 622-onlyoffice-config.yaml
#
# Description:
# OnlyOffice Document Server deployment for Nextcloud document editing.
# Community Edition (AGPL v3) — supports up to 20 simultaneous connections.
# Provides browser-based editing for DOCX, XLSX, PPTX, and PDF files.
#
# Note: The image is ~1.5 GB. First pull takes several minutes.
#
# Usage:
#   kubectl apply -f 622-onlyoffice-config.yaml
#
# Dependencies:
# - nextcloud namespace must exist
# - urbalurba-secrets must exist with ONLYOFFICE_JWT_SECRET key
#
# JWT Authentication:
# OnlyOffice uses JWT to authenticate requests from Nextcloud.
# The JWT_SECRET env var must match the jwt_secret configured in
# Nextcloud's OnlyOffice app (set via occ in the setup playbook).

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlyoffice
  namespace: nextcloud
  labels:
    app: onlyoffice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onlyoffice
  template:
    metadata:
      labels:
        app: onlyoffice
    spec:
      containers:
        - name: onlyoffice
          image: onlyoffice/documentserver:9.3.1
          ports:
            - containerPort: 80
              name: http
          env:
            - name: JWT_ENABLED
              value: "true"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: urbalurba-secrets
                  key: ONLYOFFICE_JWT_SECRET
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: onlyoffice-svc
  namespace: nextcloud
  labels:
    app: onlyoffice
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: onlyoffice
