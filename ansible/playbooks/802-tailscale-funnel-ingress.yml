---
# file: playbooks/802-tailscale-funnel-ingress.yml
# Description: Create the cluster Funnel Ingress that exposes Traefik on
# https://<TAILSCALE_OWNER_ID>.<TAILSCALE_TAILNET>.
#
# This playbook is OPT-IN. The default 'uis network up tailscale' installs only
# the operator (via 800-tailscale-operator-install.yml). The cluster Funnel
# device is created only when the user passes '--with-cluster-funnel', because
# every additional Funnel device on a shared tailnet consumes Let's Encrypt
# cert allowance (5 certs per exact hostname per 7 days) and is unnecessary
# for most demo use cases — per-service expose (802-tailscale-tunnel-addhost.yml)
# is the canonical exposure model.
#
# Prerequisite: 800-tailscale-operator-install.yml must have completed; this
# playbook fails fast if no Running operator pod exists.
#
# Usage (intended via wrapper):
#   ansible-playbook playbooks/802-tailscale-funnel-ingress.yml
#
# Required secrets in 'urbalurba-secrets' (default namespace):
#   TAILSCALE_CLIENTID, TAILSCALE_CLIENTSECRET, TAILSCALE_TAILNET, TAILSCALE_OWNER_ID.

- name: Create Tailscale cluster Funnel ingress
  hosts: localhost
  gather_facts: false
  vars:
    manifests_folder: "/mnt/urbalurbadisk/manifests"
    kubeconfig_file: "/mnt/urbalurbadisk/.uis.secrets/generated/kubeconfig/kubeconf-all"
    ingress_manifest: "803-tailscale-cluster-ingress.yaml.j2"
    default_owner_id: "k8s"
    operator_namespace: "tailscale"

  tasks:
    - name: "01 Verify kubeconfig file exists"
      ansible.builtin.stat:
        path: "{{ kubeconfig_file }}"
      register: kubeconfig_stat

    - name: "02 Fail if kubeconfig file does not exist"
      ansible.builtin.fail:
        msg: "Kubeconfig file not found at {{ kubeconfig_file }}"
      when: not kubeconfig_stat.stat.exists

    - name: "03 Refuse if Tailscale operator not running"
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ operator_namespace }}"
        label_selectors:
          - "app=operator"
        kubeconfig: "{{ kubeconfig_file }}"
      register: operator_check

    - name: "03a Fail with pointer when operator missing"
      ansible.builtin.fail:
        msg:
          - "❌ Tailscale operator is not running in namespace '{{ operator_namespace }}'."
          - "Run './uis network up tailscale' (without --with-cluster-funnel) first to install the operator,"
          - "then re-run with --with-cluster-funnel to create the cluster ingress."
      when:
        - (operator_check.resources | default([]) | length) == 0
          or (operator_check.resources | map(attribute='status.phase') | list | unique != ['Running'])

    - name: "04 Retrieve Tailscale secrets from urbalurba-secrets"
      kubernetes.core.k8s_info:
        kind: Secret
        name: urbalurba-secrets
        namespace: default
        kubeconfig: "{{ kubeconfig_file }}"
      register: urbalurba_secrets

    - name: "05 Extract Tailscale credentials"
      ansible.builtin.set_fact:
        tailscale_clientid: "{{ urbalurba_secrets.resources[0].data.TAILSCALE_CLIENTID | b64decode }}"
        tailscale_clientsecret: "{{ urbalurba_secrets.resources[0].data.TAILSCALE_CLIENTSECRET | b64decode }}"
        tailscale_tailnet: "{{ urbalurba_secrets.resources[0].data.TAILSCALE_TAILNET | b64decode }}"
        tailscale_owner_id: "{{ urbalurba_secrets.resources[0].data.TAILSCALE_OWNER_ID | default('') | b64decode | default(default_owner_id, true) }}"
      when: urbalurba_secrets.resources | length > 0

    # Pre-deploy cleanup of stale cluster Funnel devices to avoid -1 / -2 suffixes.
    - name: "06a Obtain OAuth access token for cluster-device cleanup"
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/oauth/token"
        method: POST
        body_format: form-urlencoded
        body:
          client_id: "{{ tailscale_clientid }}"
          client_secret: "{{ tailscale_clientsecret }}"
          grant_type: "client_credentials"
        status_code: [200]
        timeout: 15
      register: oauth_token_response
      ignore_errors: true
      no_log: true

    - name: "06b Extract access token"
      ansible.builtin.set_fact:
        ts_access_token: "{{ oauth_token_response.json.access_token }}"
      when: oauth_token_response.status is defined and oauth_token_response.status == 200
      no_log: true

    - name: "06c List devices in tailnet"
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/tailnet/{{ tailscale_tailnet }}/devices"
        method: GET
        headers:
          Authorization: "Bearer {{ ts_access_token }}"
        status_code: [200]
        timeout: 15
      register: devices_response
      when: ts_access_token is defined
      ignore_errors: true

    - name: "06d Find stale cluster Funnel devices"
      ansible.builtin.set_fact:
        stale_cluster_devices: >-
          {{ devices_response.json.devices | default([]) |
             selectattr('name', 'search', '^' + tailscale_owner_id + '(-[0-9]+)?[.]') |
             list }}
      when: devices_response.status is defined and devices_response.status == 200

    - name: "06e Report stale cluster Funnel devices"
      ansible.builtin.debug:
        msg: "Found {{ stale_cluster_devices | default([]) | length }} stale cluster device(s); cleaning up: {{ (stale_cluster_devices | default([])) | map(attribute='name') | join(', ') }}"
      when: (stale_cluster_devices | default([]) | length) > 0

    - name: "06f Delete stale cluster Funnel devices via Tailscale API"
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/device/{{ item.id }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ ts_access_token }}"
        status_code: [200, 204]
        timeout: 15
      loop: "{{ stale_cluster_devices | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      ignore_errors: true
      no_log: true

    - name: "07 Create temp file for cluster Ingress manifest"
      ansible.builtin.tempfile:
        state: file
        suffix: .yaml
      register: temp_ingress_file

    - name: "08 Render cluster Ingress manifest"
      ansible.builtin.template:
        src: "{{ manifests_folder }}/{{ ingress_manifest }}"
        dest: "{{ temp_ingress_file.path }}"
      vars:
        TAILSCALE_OWNER_ID: "{{ tailscale_owner_id }}"

    - name: "09 Apply cluster Funnel Ingress"
      kubernetes.core.k8s:
        src: "{{ temp_ingress_file.path }}"
        kubeconfig: "{{ kubeconfig_file }}"
        state: present

    - name: "10 Clean up temp manifest file"
      ansible.builtin.file:
        path: "{{ temp_ingress_file.path }}"
        state: absent

    - name: "11 Wait for Tailscale Funnel cert + DNS to settle"
      ansible.builtin.pause:
        seconds: 15
        prompt: "Waiting for Tailscale Funnel cert + DNS to stabilize..."

    - name: "12 Probe the cluster Funnel URL"
      # Fresh OWNER_ID first-deploys take ~90–120s for cert provisioning + DNS
      # propagation (talk52 F4). Warm-cache deploys short-circuit on the first
      # attempt via the until condition, so the larger budget only matters when
      # it's actually needed.
      ansible.builtin.uri:
        url: "https://{{ tailscale_owner_id }}.{{ tailscale_tailnet }}"
        method: GET
        status_code: 200
        validate_certs: false
        timeout: 30
      register: tunnel_test
      retries: 24
      delay: 10
      until: tunnel_test.status == 200
      failed_when: false

    - name: "13 Display tunnel test result — SUCCESS"
      ansible.builtin.debug:
        msg:
          - "🌐 Cluster Funnel up at https://{{ tailscale_owner_id }}.{{ tailscale_tailnet }}"
          - "✅ HTTP 200 — Traefik catch-all responded."
      when: tunnel_test.status is defined and tunnel_test.status == 200

    - name: "13a Display tunnel test result — INCONCLUSIVE"
      ansible.builtin.debug:
        msg:
          - "⚠ Cluster Funnel probe did not return 200 within 240s."
          - "Status: {{ tunnel_test.status | default('timeout') }}"
          - ""
          - "The Ingress was applied successfully; this is the probe that timed out."
          - "Cert provisioning on fresh OWNER_IDs can take a few minutes — re-try in a bit:"
          - "  curl https://{{ tailscale_owner_id }}.{{ tailscale_tailnet }}"
          - ""
          - "If still failing after 10 minutes:"
          - "  kubectl -n tailscale get pods"
          - "  kubectl -n tailscale logs -l app=operator --tail=50"
      when: tunnel_test.status is not defined or tunnel_test.status != 200
