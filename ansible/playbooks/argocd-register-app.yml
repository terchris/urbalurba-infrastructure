---
# file: ansible/playbooks/argocd-register-app.yml
# Register an application with ArgoCD by creating necessary Kubernetes resources.
#
# Pre-flight checks (fail fast, nothing created):
#   - Validates required variables (app_name, repo_url)
#   - Parses GitHub owner and repo name from repo_url
#   - Verifies ArgoCD is deployed and running
#   - Verifies GitHub repository exists and is accessible
#   - Verifies manifests/ directory exists in the repository
#
# If pre-flight passes:
#   - Creates a namespace with the app_name
#   - Creates a GitHub credentials secret in the argocd namespace (if PAT provided)
#   - Registers the application with ArgoCD
#   - Waits for the application to be synced and healthy
#   - Verifies all required resources are created and running
#
# On failure after resources are created:
#   - Automatically cleans up all created resources (Application, secret, namespace)
#   - No orphaned resources are left behind
#
# Required Variables:
#   app_name: Application name (used as namespace and ArgoCD app name, must be DNS-compatible)
#   repo_url: Full GitHub HTTPS URL (e.g., https://github.com/owner/repo)
#
# Optional Variables:
#   github_pat: GitHub Personal Access Token (required for private repos, optional for public)
#
# Usage:
#   ansible-playbook ansible/playbooks/argocd-register-app.yml \
#     -e "app_name=hello-world" \
#     -e "repo_url=https://github.com/owner/repo"

- name: Register application with ArgoCD
  hosts: localhost
  gather_facts: false
  vars:
    manifests_folder: "/mnt/urbalurbadisk/manifests"
    merged_kubeconf_file: "/mnt/urbalurbadisk/.uis.secrets/generated/kubeconfig/kubeconf-all"
    argocd_namespace: "argocd"
    github_secret_name: "github-{{ app_name }}"
    retry_delay: 10
    max_retries: 30
    wait_timeout: 300

  tasks:
    # ==============================================================
    # Pre-flight checks — fail fast, nothing created
    # ==============================================================

    - name: "1. Check if app_name is provided"
      ansible.builtin.fail:
        msg: "The variable 'app_name' is mandatory. Use -e app_name=my-app to specify it."
      when: app_name is not defined

    - name: "2. Check if repo_url is provided"
      ansible.builtin.fail:
        msg: "The variable 'repo_url' is mandatory. Use -e repo_url=https://github.com/owner/repo to specify it."
      when: repo_url is not defined

    - name: "3. Validate repo_url is an HTTPS URL"
      ansible.builtin.fail:
        msg: |
          ❌ Invalid repo_url: '{{ repo_url }}'

          The repository URL must be a full HTTPS URL.
          Example: https://github.com/owner/repo-name
      when: not (repo_url | regex_search('^https://'))

    - name: "4. Parse GitHub owner and repo name from URL"
      ansible.builtin.set_fact:
        repo_url_clean: "{{ repo_url | regex_replace('\\.git$', '') | regex_replace('/$', '') }}"

    - name: "4a. Extract owner and repo from URL path"
      ansible.builtin.set_fact:
        github_owner: "{{ repo_url_clean.split('/')[-2] }}"
        repo_name: "{{ repo_url_clean.split('/')[-1] }}"

    - name: "4b. Validate parsed owner and repo are not empty"
      ansible.builtin.fail:
        msg: |
          ❌ Could not parse owner and repository from URL: '{{ repo_url }}'

          Expected format: https://github.com/owner/repo-name
          Parsed owner: '{{ github_owner }}'
          Parsed repo: '{{ repo_name }}'
      when: github_owner | length == 0 or repo_name | length == 0

    - name: "4c. Display parsed URL components"
      ansible.builtin.debug:
        msg:
          - "App name:     {{ app_name }}"
          - "GitHub owner:  {{ github_owner }}"
          - "Repo name:     {{ repo_name }}"
          - "Repo URL:      {{ repo_url_clean }}"

    - name: "5. Check if ArgoCD is deployed"
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ argocd_namespace }}"
        label_selectors:
          - "app.kubernetes.io/name=argocd-server"
        kubeconfig: "{{ merged_kubeconf_file }}"
      register: argocd_pods
      failed_when: false

    - name: "5a. Fail if ArgoCD is not running"
      ansible.builtin.fail:
        msg: |
          ❌ ArgoCD is not deployed or not running.

          No ArgoCD server pods found in namespace '{{ argocd_namespace }}'.
          Deploy ArgoCD first: uis deploy argocd
      when: argocd_pods.resources | default([]) | length == 0

    - name: "5b. Check ArgoCD pods are in Running state"
      ansible.builtin.fail:
        msg: |
          ❌ ArgoCD server is not ready.

          Pod status: {{ argocd_pods.resources | map(attribute='status.phase') | list }}
          Wait for ArgoCD to be fully running before registering applications.
      when: argocd_pods.resources | selectattr('status.phase', 'ne', 'Running') | list | length > 0

    - name: "5c. Display ArgoCD check passed"
      ansible.builtin.debug:
        msg: "✅ ArgoCD server is running"

    - name: "6. Determine authentication mode"
      ansible.builtin.set_fact:
        has_github_token: "{{ github_pat | default('') | length > 0 }}"

    - name: "7. Verify GitHub repository exists (authenticated)"
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ github_owner }}/{{ repo_name }}"
        method: GET
        headers:
          Authorization: "token {{ github_pat }}"
          Accept: "application/vnd.github.v3+json"
        status_code: [200]
        return_content: false
      register: github_repo_check
      failed_when: false
      when: has_github_token | bool

    - name: "7. Verify GitHub repository exists (unauthenticated)"
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ github_owner }}/{{ repo_name }}"
        method: GET
        headers:
          Accept: "application/vnd.github.v3+json"
        status_code: [200]
        return_content: false
      register: github_repo_check_noauth
      failed_when: false
      when: not (has_github_token | bool)

    - name: "7a. Merge repo check results"
      ansible.builtin.set_fact:
        repo_check_status: "{{ (github_repo_check.status | default(0)) if (has_github_token | bool) else (github_repo_check_noauth.status | default(0)) }}"

    - name: "7b. Fail if repository not found or not accessible"
      ansible.builtin.fail:
        msg: |
          ❌ Repository '{{ github_owner }}/{{ repo_name }}' not found or not accessible.

          HTTP status: {{ repo_check_status }}

          Possible causes:
            - The repository does not exist on GitHub
            - The repository URL is incorrect
          {% if not (has_github_token | bool) %}
            - The repository is private (configure GITHUB_ACCESS_TOKEN for private repos)
          {% else %}
            - Your GitHub token does not have access to this repository
          {% endif %}

          Check: {{ repo_url_clean }}
      when: repo_check_status | int != 200

    - name: "7c. Display repository check passed"
      ansible.builtin.debug:
        msg: "✅ Repository {{ github_owner }}/{{ repo_name }} exists and is accessible"

    - name: "8. Verify manifests/ directory exists (authenticated)"
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ github_owner }}/{{ repo_name }}/contents/manifests"
        method: GET
        headers:
          Authorization: "token {{ github_pat }}"
          Accept: "application/vnd.github.v3+json"
        status_code: [200]
        return_content: false
      register: github_manifests_check
      failed_when: false
      when: has_github_token | bool

    - name: "8. Verify manifests/ directory exists (unauthenticated)"
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ github_owner }}/{{ repo_name }}/contents/manifests"
        method: GET
        headers:
          Accept: "application/vnd.github.v3+json"
        status_code: [200]
        return_content: false
      register: github_manifests_check_noauth
      failed_when: false
      when: not (has_github_token | bool)

    - name: "8a. Merge manifests check results"
      ansible.builtin.set_fact:
        manifests_check_status: "{{ (github_manifests_check.status | default(0)) if (has_github_token | bool) else (github_manifests_check_noauth.status | default(0)) }}"

    - name: "8b. Fail if manifests/ directory not found"
      ansible.builtin.fail:
        msg: |
          ❌ No manifests/ directory found in repository '{{ github_owner }}/{{ repo_name }}'.

          ArgoCD expects Kubernetes manifests in a manifests/ directory.
          Make sure your repo has this structure:

            {{ repo_name }}/
              manifests/
                deployment.yaml
                service.yaml
      when: manifests_check_status | int != 200

    - name: "8c. Display manifests check passed"
      ansible.builtin.debug:
        msg: "✅ manifests/ directory found in repository"

    - name: "9. Display registration plan"
      ansible.builtin.debug:
        msg: >
          Registering application with ArgoCD:
            - App name: {{ app_name }}
            - Repository: {{ github_owner }}/{{ repo_name }} (verified)
            - Repo URL: {{ repo_url_clean }}
            - Namespace: {{ app_name }}
            - ArgoCD Namespace: {{ argocd_namespace }}
            - Wait timeout: {{ wait_timeout }} seconds

    # ==============================================================
    # Resource creation + deployment — with auto-cleanup on failure
    # ==============================================================

    - name: "Deploy and verify application"
      block:
        - name: "10. Create namespace for the application"
          kubernetes.core.k8s:
            name: "{{ app_name }}"
            api_version: v1
            kind: Namespace
            state: present
            kubeconfig: "{{ merged_kubeconf_file }}"

        - name: "11. Create GitHub credentials secret (private repos)"
          kubernetes.core.k8s:
            name: "{{ github_secret_name }}"
            namespace: "{{ argocd_namespace }}"
            api_version: v1
            kind: Secret
            state: present
            kubeconfig: "{{ merged_kubeconf_file }}"
            resource_definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: "{{ github_secret_name }}"
                namespace: "{{ argocd_namespace }}"
              type: Opaque
              stringData:
                type: git
                url: "{{ repo_url_clean }}.git"
                username: "{{ github_owner }}"
                password: "{{ github_pat }}"
          when: has_github_token | bool

        - name: "11. Skip credentials secret (public repo, no token)"
          ansible.builtin.debug:
            msg: "Skipping credentials secret — public repo, no GitHub token configured"
          when: not (has_github_token | bool)

        - name: "12. Create ArgoCD Application"
          kubernetes.core.k8s:
            name: "{{ app_name }}"
            namespace: "{{ argocd_namespace }}"
            api_version: argoproj.io/v1alpha1
            kind: Application
            state: present
            kubeconfig: "{{ merged_kubeconf_file }}"
            definition:
              metadata:
                name: "{{ app_name }}"
                namespace: "{{ argocd_namespace }}"
              spec:
                project: default
                source:
                  repoURL: "{{ repo_url_clean }}.git"
                  targetRevision: HEAD
                  path: manifests
                destination:
                  server: https://kubernetes.default.svc
                  namespace: "{{ app_name }}"
                syncPolicy:
                  automated:
                    prune: true
                    selfHeal: true
                  syncOptions:
                    - CreateNamespace=true

        - name: "13. Wait for ArgoCD Application to be created"
          kubernetes.core.k8s_info:
            kind: Application
            name: "{{ app_name }}"
            namespace: "{{ argocd_namespace }}"
            kubeconfig: "{{ merged_kubeconf_file }}"
            api_version: argoproj.io/v1alpha1
          register: argocd_app
          until: argocd_app.resources | length > 0
          retries: "{{ max_retries }}"
          delay: "{{ retry_delay }}"
          changed_when: false

        - name: "14. Display initial ArgoCD Application status"
          ansible.builtin.debug:
            msg:
              - "ArgoCD Application created. Current status:"
              - "Health Status: {{ argocd_app.resources[0].status.health.status | default('Unknown') }}"
              - "Sync Status: {{ argocd_app.resources[0].status.sync.status | default('Unknown') }}"
          when: argocd_app.resources | length > 0

        - name: "15. Wait for ArgoCD application to start syncing"
          kubernetes.core.k8s_info:
            kind: Application
            name: "{{ app_name }}"
            namespace: "{{ argocd_namespace }}"
            kubeconfig: "{{ merged_kubeconf_file }}"
            api_version: argoproj.io/v1alpha1
          register: app_status
          until: >
            app_status.resources | length > 0 and
            app_status.resources[0].status.sync.status is defined and
            app_status.resources[0].status.sync.status != 'Unknown'
          retries: "{{ max_retries }}"
          delay: "{{ retry_delay }}"
          changed_when: false

        - name: "16. Check if sync timeout occurred"
          ansible.builtin.fail:
            msg: |
              Timeout waiting for ArgoCD application to start syncing.

              ArgoCD sync error: {{ app_status.resources[0].status.operationState.message | default('No error message available') }}
              Sync status: {{ app_status.resources[0].status.sync.status | default('Unknown') }}
          when: >
            app_status.resources[0].status.sync.status is not defined or
            app_status.resources[0].status.sync.status == 'Unknown'

        - name: "17. Wait for sync status to be 'Synced'"
          kubernetes.core.k8s_info:
            kind: Application
            name: "{{ app_name }}"
            namespace: "{{ argocd_namespace }}"
            kubeconfig: "{{ merged_kubeconf_file }}"
            api_version: argoproj.io/v1alpha1
          register: sync_status
          until: >
            sync_status.resources | length > 0 and
            sync_status.resources[0].status.sync.status is defined and
            sync_status.resources[0].status.sync.status == 'Synced'
          retries: "{{ max_retries }}"
          delay: "{{ retry_delay }}"
          changed_when: false

        - name: "18. Check if sync completion timeout occurred"
          ansible.builtin.fail:
            msg: |
              Timeout waiting for ArgoCD application to be synced.

              Sync status: {{ sync_status.resources[0].status.sync.status | default('Unknown') }}
              ArgoCD sync error: {{ sync_status.resources[0].status.operationState.message | default('No error message available') }}
          when: >
            sync_status.resources[0].status.sync.status is not defined or
            sync_status.resources[0].status.sync.status != 'Synced'

        - name: "19. Display sync complete status"
          ansible.builtin.debug:
            msg:
              - "Application has been synced successfully."
              - "Health Status: {{ sync_status.resources[0].status.health.status | default('Unknown') }}"
              - "Sync Status: {{ sync_status.resources[0].status.sync.status }}"
          when: sync_status.resources | length > 0

        - name: "20. Wait for health status to be 'Healthy'"
          kubernetes.core.k8s_info:
            kind: Application
            name: "{{ app_name }}"
            namespace: "{{ argocd_namespace }}"
            kubeconfig: "{{ merged_kubeconf_file }}"
            api_version: argoproj.io/v1alpha1
          register: health_status
          until: >
            health_status.resources | length > 0 and
            health_status.resources[0].status.health.status is defined and
            health_status.resources[0].status.health.status == 'Healthy'
          retries: "{{ max_retries }}"
          delay: "{{ retry_delay }}"
          changed_when: false

        - name: "21. Check if health timeout occurred"
          ansible.builtin.fail:
            msg: |
              Timeout waiting for ArgoCD application to be healthy.

              Health status: {{ health_status.resources[0].status.health.status | default('Unknown') }}
              ArgoCD error: {{ health_status.resources[0].status.operationState.message | default('No error message available') }}
          when: >
            health_status.resources[0].status.health.status is not defined or
            health_status.resources[0].status.health.status != 'Healthy'

        - name: "22. Display health status"
          ansible.builtin.debug:
            msg:
              - "Application is now healthy."
              - "Health Status: {{ health_status.resources[0].status.health.status }}"
              - "Sync Status: {{ health_status.resources[0].status.sync.status }}"
          when: health_status.resources | length > 0

        - name: "23. Get all pods in the application namespace"
          kubernetes.core.k8s_info:
            kind: Pod
            namespace: "{{ app_name }}"
            kubeconfig: "{{ merged_kubeconf_file }}"
          register: namespace_pods
          changed_when: false

        - name: "24. Display pods in namespace"
          ansible.builtin.debug:
            msg: "Pods in namespace {{ app_name }}: {{ namespace_pods.resources | map(attribute='metadata.name') | list }}"
          when: namespace_pods.resources | length > 0

        - name: "25. Wait for all pods to be in Running state"
          kubernetes.core.k8s_info:
            kind: Pod
            namespace: "{{ app_name }}"
            kubeconfig: "{{ merged_kubeconf_file }}"
          register: pod_status
          until: >
            pod_status.resources | length > 0 and
            pod_status.resources | selectattr('status.phase', 'ne', 'Running') | list | length == 0
          retries: "{{ max_retries }}"
          delay: "{{ retry_delay }}"
          changed_when: false
          when: namespace_pods.resources | length > 0

        - name: "25a. Diagnose pod failures on timeout"
          block:
            - name: "25a-1. Check for ImagePullBackOff"
              ansible.builtin.set_fact:
                image_pull_failures: >-
                  {{ pod_status.resources
                     | selectattr('status.containerStatuses', 'defined')
                     | map(attribute='status.containerStatuses')
                     | flatten
                     | selectattr('state.waiting', 'defined')
                     | selectattr('state.waiting.reason', 'defined')
                     | selectattr('state.waiting.reason', 'in', ['ImagePullBackOff', 'ErrImagePull'])
                     | map(attribute='image')
                     | list }}
              failed_when: false

            - name: "25a-2. Check for CrashLoopBackOff"
              ansible.builtin.set_fact:
                crash_loop_failures: >-
                  {{ pod_status.resources
                     | selectattr('status.containerStatuses', 'defined')
                     | map(attribute='status.containerStatuses')
                     | flatten
                     | selectattr('state.waiting', 'defined')
                     | selectattr('state.waiting.reason', 'defined')
                     | selectattr('state.waiting.reason', 'eq', 'CrashLoopBackOff')
                     | map(attribute='name')
                     | list }}
              failed_when: false

            - name: "25a-3. Check for Pending pods"
              ansible.builtin.set_fact:
                pending_pods: "{{ pod_status.resources | selectattr('status.phase', 'eq', 'Pending') | map(attribute='metadata.name') | list }}"
              failed_when: false

            - name: "25a-4. Fail with diagnostic message"
              ansible.builtin.fail:
                msg: |
                  Timeout waiting for pods to be in Running state.

                  Pod phases: {{ pod_status.resources | map(attribute='status.phase') | list }}
                  {% if image_pull_failures | default([]) | length > 0 %}

                  ❌ IMAGE PULL FAILURE — Container image not found or not accessible.
                  Failed images: {{ image_pull_failures | join(', ') }}
                  Check image names and tags in your manifests.
                  {% endif %}
                  {% if crash_loop_failures | default([]) | length > 0 %}

                  ❌ CRASH LOOP — Container starts but crashes immediately.
                  Failing containers: {{ crash_loop_failures | join(', ') }}
                  Check application logs: kubectl logs -n {{ app_name }} <pod-name>
                  {% endif %}
                  {% if pending_pods | default([]) | length > 0 %}

                  ❌ PODS PENDING — Cannot be scheduled.
                  Pending pods: {{ pending_pods | join(', ') }}
                  Check cluster resources (CPU/memory) or node availability.
                  {% endif %}
          when: >
            namespace_pods.resources | length > 0 and
            pod_status.resources | selectattr('status.phase', 'ne', 'Running') | list | length > 0

        - name: "26. Get all services in the application namespace"
          kubernetes.core.k8s_info:
            kind: Service
            namespace: "{{ app_name }}"
            kubeconfig: "{{ merged_kubeconf_file }}"
          register: service_info
          changed_when: false

        - name: "27. Get service connection details"
          ansible.builtin.set_fact:
            service_name: "{{ service_info.resources[0].metadata.name | default(app_name + '-service') }}"
            service_port: "{{ service_info.resources[0].spec.ports[0].port | default(80) }}"
            service_port_name: "{{ service_info.resources[0].spec.ports[0].name | default('http') }}"
            service_target_port: "{{ service_info.resources[0].spec.ports[0].targetPort | default('80') }}"
          when: service_info.resources | length > 0

        - name: "27b. Create platform IngressRoute for application"
          kubernetes.core.k8s:
            state: present
            kubeconfig: "{{ merged_kubeconf_file }}"
            definition: "{{ ingressroute_def | from_yaml }}"
          vars:
            ingressroute_def: |
              apiVersion: traefik.io/v1alpha1
              kind: IngressRoute
              metadata:
                name: "{{ app_name }}-ingressroute"
                namespace: "{{ app_name }}"
                labels:
                  app: "{{ app_name }}"
                  routing: unified
                  managed-by: urbalurba-platform
              spec:
                entryPoints:
                  - web
                routes:
                  - match: "HostRegexp(`^{{ app_name }}\\..+$`)"
                    kind: Rule
                    services:
                      - name: "{{ service_name }}"
                        port: {{ service_port | int }}
          when: service_info.resources | length > 0

        - name: "28. Get standard Ingress resources"
          kubernetes.core.k8s_info:
            kind: Ingress
            namespace: "{{ app_name }}"
            kubeconfig: "{{ merged_kubeconf_file }}"
          register: ingress_info
          changed_when: false

        - name: "28b. Get Traefik IngressRoute resources"
          kubernetes.core.k8s_info:
            api_version: traefik.io/v1alpha1
            kind: IngressRoute
            namespace: "{{ app_name }}"
            kubeconfig: "{{ merged_kubeconf_file }}"
          register: ingressroute_info
          changed_when: false
          failed_when: false

        - name: "29. Determine application URL"
          ansible.builtin.set_fact:
            ingress_host: >-
              {% if ingress_info.resources | length > 0 %}
              {{ ingress_info.resources[0].spec.rules[0].host | default(app_name + '.localhost') }}
              {% elif ingressroute_info.resources | default([]) | length > 0 %}
              {{ app_name }}.localhost
              {% else %}
              {{ app_name }}.localhost
              {% endif %}
            ingress_type: >-
              {% if ingress_info.resources | length > 0 %}
              Ingress
              {% elif ingressroute_info.resources | default([]) | length > 0 %}
              IngressRoute (Traefik)
              {% else %}
              None
              {% endif %}
            ingress_count: "{{ (ingress_info.resources | length) + (ingressroute_info.resources | default([]) | length) }}"

        - name: "30. Display final summary"
          ansible.builtin.debug:
            msg:
              - "=================================================="
              - "APPLICATION REGISTRATION SUCCESSFUL"
              - "=================================================="
              - "Application '{{ app_name }}' registered in ArgoCD"
              - "Repository: {{ repo_url_clean }}"
              - "Namespace '{{ app_name }}' created and resources deployed"
              - ""
              - "ArgoCD Status"
              - "   Health: {{ health_status.resources[0].status.health.status }}"
              - "   Sync: {{ health_status.resources[0].status.sync.status }}"
              - ""
              - "Kubernetes Resources"
              - "   Pods: {{ namespace_pods.resources | map(attribute='metadata.name') | list | length }}"
              - "   Services: {{ service_info.resources | map(attribute='metadata.name') | list | length }}"
              - "   Routing: {{ ingress_count | trim }} ({{ ingress_type | trim }})"
              - ""
              - "Service Information:"
              - "   Name: {{ service_name }}"
              - "   Port: {{ service_port }} (Type: {{ service_port_name }})"
              - "   Target Port: {{ service_target_port }}"
              - ""
              - "Visit your application at: http://{{ ingress_host | trim }}"
              - ""
              - "To remove: uis argocd remove {{ app_name }}"
              - ""
              - "✅ Registration and deployment complete!"
          when: service_info.resources | length > 0

        - name: "31. Display final summary (no services)"
          ansible.builtin.debug:
            msg:
              - "=================================================="
              - "APPLICATION REGISTRATION INCOMPLETE"
              - "=================================================="
              - "Application '{{ app_name }}' registered in ArgoCD"
              - "Repository: {{ repo_url_clean }}"
              - "Namespace '{{ app_name }}' created and resources deployed"
              - ""
              - "ArgoCD Status"
              - "   Health: {{ health_status.resources[0].status.health.status }}"
              - "   Sync: {{ health_status.resources[0].status.sync.status }}"
              - ""
              - "❌ NO SERVICES DETECTED. Your application cannot be accessed!"
              - "This usually indicates a problem with your Kubernetes manifests."
              - "Please check your deployment.yaml to ensure it includes a Service definition."
              - ""
              - "To check deployment status, use the ArgoCD UI:"
              - "   Open http://argocd.localhost in your browser"
          when: service_info.resources | length == 0

      # ==============================================================
      # Auto-cleanup on failure — remove all created resources
      # ==============================================================

      rescue:
        - name: "CLEANUP 1. Display failure message"
          ansible.builtin.debug:
            msg:
              - "=================================================="
              - "❌ APPLICATION REGISTRATION FAILED"
              - "=================================================="
              - "Error: {{ ansible_failed_result.msg | default('Unknown error') }}"
              - ""
              - "Cleaning up created resources..."

        - name: "CLEANUP 2. Remove ArgoCD Application"
          kubernetes.core.k8s:
            name: "{{ app_name }}"
            namespace: "{{ argocd_namespace }}"
            api_version: argoproj.io/v1alpha1
            kind: Application
            state: absent
            kubeconfig: "{{ merged_kubeconf_file }}"
            wait: true
            wait_timeout: 120
          failed_when: false

        - name: "CLEANUP 3. Remove GitHub credentials secret"
          kubernetes.core.k8s:
            name: "{{ github_secret_name }}"
            namespace: "{{ argocd_namespace }}"
            api_version: v1
            kind: Secret
            state: absent
            kubeconfig: "{{ merged_kubeconf_file }}"
          failed_when: false
          when: has_github_token | default(false) | bool

        - name: "CLEANUP 4. Remove application namespace"
          kubernetes.core.k8s:
            name: "{{ app_name }}"
            api_version: v1
            kind: Namespace
            state: absent
            kubeconfig: "{{ merged_kubeconf_file }}"
            wait: true
            wait_timeout: 120
          failed_when: false

        - name: "CLEANUP 5. Display cleanup complete"
          ansible.builtin.debug:
            msg:
              - "All resources have been cleaned up."
              - ""
              - "To debug, check what went wrong:"
              - "  - Re-register with: uis argocd register {{ app_name }} {{ repo_url }}"
              - "  - Check image names and tags in your manifests"
              - "  - Verify container images are publicly accessible"

        - name: "CLEANUP 6. Fail the playbook"
          ansible.builtin.fail:
            msg: "Registration failed. All resources have been cleaned up. See errors above."
