<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <title>LiteLLM</title>
  <!-- Light blue circle background -->
  <circle cx="120" cy="120" r="120" fill="#87CEEB"/>
  <!-- Bullet train (Shinkansen) icon -->
  <g transform="translate(120,120) scale(0.85)">
    <!-- Train body - main shell -->
    <path d="M-70,15 C-70,-25 -50,-55 -10,-65 L60,-65 C75,-65 85,-55 90,-40 L95,-20 C98,-10 98,5 95,15 L90,30 C85,40 75,45 60,45 L-40,45 C-58,45 -70,35 -70,15z" fill="#E8E8E8" stroke="#C0C0C0" stroke-width="1.5"/>
    <!-- Train nose - aerodynamic front -->
    <path d="M-70,15 C-70,-25 -50,-55 -10,-65 L-10,-65 C-45,-55 -75,-20 -85,10 C-88,20 -85,30 -75,35 L-40,45 C-58,45 -70,35 -70,15z" fill="#D8D8D8" stroke="#B8B8B8" stroke-width="1"/>
    <!-- Blue windshield -->
    <path d="M-55,-5 C-50,-30 -35,-50 -5,-58 L30,-58 C40,-58 45,-50 45,-40 L45,-15 C45,-5 40,2 30,2 L-30,2 C-45,2 -55,0 -55,-5z" fill="#1565C0"/>
    <!-- Windshield divider -->
    <line x1="-5" y1="-58" x2="-5" y2="2" stroke="#0D47A1" stroke-width="2"/>
    <!-- Blue stripe along body -->
    <path d="M-75,20 L95,20 L93,28 L-72,28z" fill="#1976D2"/>
    <!-- Windows -->
    <rect x="50" y="-50" width="12" height="18" rx="2" fill="#90CAF9" opacity="0.8"/>
    <rect x="67" y="-50" width="12" height="18" rx="2" fill="#90CAF9" opacity="0.8"/>
    <!-- Bottom/undercarriage -->
    <path d="M-40,45 L60,45 L65,55 L-45,55z" fill="#555"/>
    <!-- Wheels -->
    <circle cx="-20" cy="55" r="8" fill="#333"/>
    <circle cx="-20" cy="55" r="4" fill="#666"/>
    <circle cx="40" cy="55" r="8" fill="#333"/>
    <circle cx="40" cy="55" r="4" fill="#666"/>
    <!-- Headlight -->
    <ellipse cx="-78" cy="25" rx="5" ry="4" fill="#FFF9C4"/>
  </g>
</svg>
