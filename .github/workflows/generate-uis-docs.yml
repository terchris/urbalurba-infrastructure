name: Generate UIS Documentation

on:
  push:
    branches: [main]
    paths:
      - 'provision-host/uis/services/**'
      - 'provision-host/uis/tools/**'
      - 'provision-host/uis/lib/categories.sh'
      - 'provision-host/uis/lib/stacks.sh'
      - 'provision-host/uis/manage/uis-docs.sh'
      - 'provision-host/uis/manage/uis-docs-markdown.sh'
      - 'provision-host/uis/manage/uis-docs-plan-indexes.sh'
      - 'website/docs/ai-developer/plans/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    name: Generate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate JSON files
        run: bash provision-host/uis/manage/uis-docs.sh

      - name: Validate generated JSON
        run: |
          echo "Validating services.json..."
          jq . website/src/data/services.json > /dev/null
          echo "Validating categories.json..."
          jq . website/src/data/categories.json > /dev/null
          echo "Validating tools.json..."
          jq . website/src/data/tools.json > /dev/null
          echo "All JSON files valid"

      - name: Generate Markdown documentation
        run: bash provision-host/uis/manage/uis-docs-markdown.sh

      - name: Generate plan index pages
        run: bash provision-host/uis/manage/uis-docs-plan-indexes.sh

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code website/ || echo "changes=true" >> $GITHUB_OUTPUT
          git ls-files --others --exclude-standard website/ | grep -q . && echo "changes=true" >> $GITHUB_OUTPUT || true

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add website/src/data/ website/docs/services/ website/docs/ai-developer/plans/
          git commit -m "chore: regenerate UIS documentation

          Auto-generated by GitHub Actions when service/tool scripts change.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push

  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build
        env:
          GITHUB_ORG: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
